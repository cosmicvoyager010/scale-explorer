<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Scale Explorer</title>

    <meta name="description" content="Experience the Scale of the Universe">

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <!-- Animated Star Background -->
    <div id="stars"></div>

    <!-- Welcome Screen -->
    <section id="welcome">

        <h1>Scale Explorer</h1>

        <p class="subtitle">
            Experience the Scale of the Universe
        </p>

        <button id="beginButton">
            Begin Journey
        </button>

        <div class="version">
            Version 0.2
        </div>

    </section>

    <!-- Main Experience -->
    <main id="universe">

        <div id="earth-container">

            <div id="earth"></div>

            <h2>Earth</h2>

            <p>
                Your journey begins here.
            </p>

        </div>

        <div id="moon-container">

            <div id="moon"></div>

            <h2>Moon</h2>

            <p id="moonInfo">
                Distance: 384,400 km
            </p>

        </div>

    </main>

    <footer>
        Scale Explorer © 2026
    </footer>

    <script src="app.js"></script>

</body>

</html>
