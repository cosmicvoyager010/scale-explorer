<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scale Explorer v0.3</title>

<style>

body {

    margin:0;

    background:
    radial-gradient(circle at center, #182850 0%, #050816 65%);

    color:white;

    font-family:Arial, sans-serif;

    text-align:center;

    overflow-x:hidden;

}


/* Space stars */

body::before {

    content:"";

    position:fixed;

    inset:0;

    background-image:
    radial-gradient(circle, white 1px, transparent 1px),
    radial-gradient(circle, white 1px, transparent 1px);

    background-size:
    120px 120px,
    200px 200px;

    background-position:
    30px 40px,
    80px 100px;

    opacity:0.35;

    pointer-events:none;

}



h1 {

    margin:20px;

}



.scale-container {

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:8px;

    padding:10px;

}



.scale-button {

    background:#18213a;

    color:white;

    border:none;

    padding:8px 12px;

    border-radius:15px;

    cursor:pointer;

}



.scale-button:hover {

    background:#334b85;

}



.active {

    background:#4c8dff;

}




.viewer {

    height:320px;

    display:flex;

    justify-content:center;

    align-items:center;

}




.object {

    font-size:120px;

    animation:float 3s infinite ease-in-out;

}



@keyframes float {

    0% {

        transform:translateY(0);

    }


    50% {

        transform:translateY(-15px);

    }


    100% {

        transform:translateY(0);

    }

}




/* Living Earth */

.earth {


    width:190px;

    height:190px;

    border-radius:50%;


    background:

    linear-gradient(

    90deg,

    #06152f,

    #1478d4,

    #4fd0ff,

    #06234d

    );


    box-shadow:

    0 0 25px #4db8ff,

    0 0 60px rgba(80,180,255,0.6),

    0 0 100px rgba(80,180,255,0.3);



    animation:

    rotateEarth 12s linear infinite;


    position:relative;

}



.earth::after {


    content:"";


    position:absolute;


    right:0;

    top:0;


    width:50%;

    height:100%;


    border-radius:50%;


    background:

    rgba(0,0,30,0.55);


}



@keyframes rotateEarth {


    from {

        transform:rotate(0deg);

    }


    to {

        transform:rotate(360deg);

    }

}



.info {


    max-width:600px;

    margin:auto;

    padding:20px;

    font-size:18px;

}



.controls {

    margin:20px;

}



button {

    padding:12px 20px;

    margin:5px;

    border-radius:20px;

    border:none;

    cursor:pointer;

}
