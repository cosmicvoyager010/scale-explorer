<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scale Explorer Journey Demo</title>


<style>

body {

    margin:0;

    height:100vh;

    background:
    radial-gradient(circle at center,#182850,#050816);

    color:white;

    font-family:Arial,sans-serif;

    text-align:center;

    overflow:hidden;

}



h1 {

    margin-top:30px;

}



.space {

    height:350px;

    display:flex;

    justify-content:center;

    align-items:center;

}



.object {

    font-size:140px;

    animation:float 3s infinite ease-in-out;

}



.earth {

    width:220px;

    height:220px;

    border-radius:50%;


    background:
    radial-gradient(circle at 35% 35%,
    #4fd0ff,
    #1478d4 45%,
    #06234d 90%);


    box-shadow:

    0 0 40px #4db8ff,
    0 0 100px rgba(80,180,255,0.5);


    animation:rotate 15s linear infinite;

}



@keyframes rotate {

    from {
        transform:rotate(0deg);
    }

    to {
        transform:rotate(360deg);
    }

}



@keyframes float {

    0% {
        transform:translateY(0);
    }

    50% {
        transform:translateY(-20px);
    }

    100% {
        transform:translateY(0);
    }

}



button {

    padding:15px 30px;

    border:none;

    border-radius:30px;

    font-size:18px;

    cursor:pointer;

}



.info {

    font-size:22px;

    padding:20px;

}



.small {

    font-size:16px;

    opacity:0.8;

}



</style>

</head>


<body>


<h1>🌌 Scale Explorer Journey</h1>


<div class="space" id="viewer">

🌍

</div>



<div class="info">

<h2 id="title">
You are here
</h2>


<p id="text">
Your journey begins on Earth.
</p>


</div>



<button onclick="nextStep()">

🚀 Travel outward

</button>




<script>


const journey = [


{

title:"You are here",

icon:"🌍",

text:"Your journey begins on Earth."

},


{

title:"Earth",

earth:true,

text:"A living planet traveling through space. This is our home."

},


{

title:"Moon",

icon:"🌙",

text:"Earth's companion. A world that has inspired exploration."

},


{

title:"Sun",

icon:"☀️",

text:"Our star. The source of energy that powers Earth."

},


{

title:"Solar System",

icon:"🪐",

text:"A family of worlds orbiting the Sun."

},


{

title:"Galaxy",

icon:"🌌",

text:"A huge island of hundreds of billions of stars."

},


{

title:"Universe",

icon:"✨",

text:"Everything we know: space, time, matter, and energy."

}


];


let current=0;



function nextStep(){


if(current < journey.length-1){

current++;

}



show();


}




function show(){


let item=journey[current];


document.getElementById("title").innerText=item.title;


document.getElementById("text").innerText=item.text;



let viewer=document.getElementById("viewer");



if(item.earth){


viewer.innerHTML='<div class="earth"></div>';

}

else{


viewer.innerHTML=
'<div class="object">'+item.icon+'</div>';

}



}



show();


</script>



</body>

</html>
